{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #0a0e27;
            --blue-deep: #1a237e;
            --blue-mid: #1565c0;
            --blue-bright: #1976d2;
            --gold: #fbbf24;
            --border: #e2e8f4;
            --text-primary: #0f1535;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --surface-2: #f8faff;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--navy) 0%, #0d1a5e 50%, var(--blue-deep) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }
        .bg-orb-1 { width: 400px; height: 400px; background: #42a5f5; top: -100px; right: -100px; }
        .bg-orb-2 { width: 300px; height: 300px; background: var(--gold); bottom: -80px; left: -80px; }
        .bg-orb-3 { width: 200px; height: 200px; background: var(--blue-bright); top: 50%; left: 20%; }

        .login-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            z-index: 1;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .login-logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #1a237e, #1976d2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .login-logo-icon svg { display: block; }

        .login-brand { font-size: 1.8rem; font-weight: 900; color: var(--text-primary); letter-spacing: -1px; line-height: 1; }
        .login-tagline { font-size: 0.72rem; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.5px; margin-top: 2px; }

        .login-divider { height: 1px; background: var(--border); margin-bottom: 24px; }

        .login-title { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
        .login-subtitle { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 28px; }

        .form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

        .form-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--blue-deep);
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: var(--surface-2);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: var(--blue-bright);
            box-shadow: 0 0 0 3px rgba(25,118,210,0.12);
            background: #fff;
        }

        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(21,101,192,0.3);
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(21,101,192,0.4); }

        .login-footer { font-size: 0.72rem; color: var(--text-muted); text-align: center; margin-top: 20px; }

        .alert-error {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #cc0000;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="login-card">
    <div class="login-logo">
        <!-- <div class="login-logo-icon">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                <path d="M4 20 L8 11 L13 17 L16 12 L22 20 Z" fill="white" opacity="0.9"/>
                <circle cx="17" cy="7" r="3" fill="#fbbf24"/>
            </svg>
        </div> -->
        <div>
            <img src="../../static/img/logo.png" alt="">
            <p class="login-tagline">Inteligência Imobiliária</p>
        </div>
    </div>

    <div class="login-divider"></div>

    <h2 class="login-title">Bem-vindo de volta</h2>
    <p class="login-subtitle">Entre com suas credenciais para continuar</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert-error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="form-field">
            <label class="form-label">Usuário</label>
            <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <input class="form-input" type="text" name="username" placeholder="Digite seu usuário" autofocus required>
            </div>
        </div>

        <div class="form-field">
            <label class="form-label">Senha</label>
            <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
                <input class="form-input" type="password" name="password" placeholder="Digite sua senha" required>
            </div>
        </div>

        <button type="submit" class="btn-login">
            Entrar
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </button>
    </form>

    <p class="login-footer">Sistema protegido · CORE © 2026</p>
</div>

</body>
</html>
