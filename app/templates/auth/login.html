<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CORE — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #000040;
            --mid-blue: #00008b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--mid-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--dark-blue);
            letter-spacing: -2px;
        }

        .login-logo span {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin-top: -4px;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--mid-blue);
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--mid-blue);
            box-shadow: none;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--dark-blue), var(--mid-blue));
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .btn-login:hover { opacity: 0.9; }

        .alert-error {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #cc0000;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.82rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <h1>CORE 🔍</h1>
        <span>Inteligência Imobiliária</span>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert-error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Digite seu usuário"
                autofocus
                required
            >
        </div>

        <div class="mb-4">
            <label class="form-label">Senha</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Digite sua senha"
                required
            >
        </div>

        <button type="submit" class="btn-login">Entrar</button>
    </form>
</div>

</body>
</html>
