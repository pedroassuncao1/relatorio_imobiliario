<!DOCTYPE html>
<html>
<head>
    <title>Upload de Planilha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card p-4 shadow" style="max-width:500px; margin:0 auto;">
        <h3 style="color:#000040;">📤 Novo Upload</h3>
        <p style="font-size:0.85rem; color:#888;">
            Cada upload cria um dashboard separado.
        </p>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold" style="font-size:0.8rem;">
                    NOME DO DASHBOARD
                </label>
                <input type="text" name="nome_dashboard"
                       class="form-control" required
                       placeholder="ex: Ilha do Leite — Mar/2026">
            </div>

            <div class="row mb-3">
                <div class="col-8">
                    <label class="form-label fw-bold" style="font-size:0.8rem;">
                        CIDADE
                    </label>
                    <input type="text" name="cidade"
                           class="form-control" required
                           placeholder="ex: Recife">
                </div>
                <div class="col-4">
                    <label class="form-label fw-bold" style="font-size:0.8rem;">
                        ESTADO (UF)
                    </label>
                    <input type="text" name="estado"
                           class="form-control" required
                           placeholder="ex: PE" maxlength="2"
                           style="text-transform:uppercase;">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" style="font-size:0.8rem;">
                    PLANILHA (.xlsx)
                </label>
                <input type="file" name="planilha"
                       class="form-control" accept=".xlsx,.csv" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Processar com IA
            </button>
            <a href="{% url 'lista_dashboards' %}"
               class="btn btn-outline-secondary w-100 mt-2">
                ← Voltar
            </a>
        </form>
    </div>
</body>
</html>
